    <style>
        #renderCanvas, #starfield, .vignette { display: none; }
        .hud, .map-overlay, .briefing { display: none !important; }
        body { background: #080c12; }

        /* ── Base ──────────────────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow: auto !important; overflow-y: scroll !important; position: static !important; height: auto !important; width: auto !important; overscroll-behavior: auto !important; }
        .page { max-width: 600px; margin: 0 auto; padding: 32px 20px 80px; }

        /* ── Section titre ─────────────────── */
        .sec-title {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 5px;
            color: rgba(0,225,255,0.45);
            text-transform: uppercase;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,225,255,0.12);
            margin-bottom: 24px;
        }

        /* ── Hero ───────────────────────────── */
        .hero { text-align: center; margin-bottom: 48px; }
        .hero-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; margin: 0 auto 16px;
            border: 2px solid rgba(0,225,255,0.3);
            box-shadow: 0 0 20px rgba(0,225,255,0.12);
        }
        .hero-name {
            font-family: 'Orbitron', monospace;
            font-size: 20px; font-weight: 800; color: #fff;
            letter-spacing: 3px; margin-bottom: 6px;
        }
        .hero-role {
            font-size: 10px; letter-spacing: 3px; color: #00e1ff;
            font-family: 'Orbitron', monospace; text-transform: uppercase;
            margin-bottom: 12px;
        }
        .hero-tagline {
            font-size: 12px; color: rgba(255,255,255,0.65);
            line-height: 1.6; margin-bottom: 16px;
        }

        /* ── Stats ─────────────────────────── */
        .stats { display: flex; gap: 0; justify-content: center; }
        .stat {
            display: flex; flex-direction: column; align-items: center;
            padding: 12px 20px;
            border-right: 1px solid rgba(255,255,255,0.06);
        }
        .stat:last-child { border-right: none; }
        .stat-n { font-size: 18px; font-weight: 700; color: #00e1ff; font-family: 'Orbitron', monospace; }
        .stat-l { font-size: 9px; color: rgba(255,255,255,0.55); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

        /* ── About ─────────────────────────── */
        .about { margin-bottom: 40px; }
        .about-text { font-size: 12px; line-height: 1.75; color: rgba(255,255,255,0.7); margin-bottom: 12px; }

        /* ── Skills ────────────────────────── */
        .skills { margin-bottom: 40px; }
        .skill-cat { margin-bottom: 20px; }
        .skill-cat-name {
            font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.5);
            text-transform: uppercase; margin-bottom: 8px; font-family: 'Orbitron', monospace;
        }
        .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .skill-tags span {
            font-size: 10px; padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px; color: rgba(255,255,255,0.75);
        }

        /* ── Projects ──────────────────────── */
        .projects { margin-bottom: 40px; }
        .proj-card {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .proj-card:first-child { border-top: 1px solid rgba(255,255,255,0.06); }
        .proj-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .proj-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); }
        .proj-status {
            font-size: 8px; letter-spacing: 1.5px; padding: 2px 7px;
            border-radius: 2px; font-family: 'Orbitron', monospace; flex-shrink: 0; margin-left: 10px;
        }
        .proj-status.terminée { background: rgba(0,225,255,0.08); color: #00e1ff; border: 1px solid rgba(0,225,255,0.2); }
        .proj-status.actif { background: rgba(0,255,100,0.08); color: #00ff64; border: 1px solid rgba(0,255,100,0.2); }
        .proj-status.en-cours { background: rgba(255,180,0,0.08); color: #ffb400; border: 1px solid rgba(255,180,0,0.2); }
        .proj-status.archivé { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.1); }
        .proj-desc { font-size: 11px; line-height: 1.55; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
        .proj-img { width: 100%; border-radius: 3px; margin-bottom: 8px; max-height: 180px; object-fit: cover; }
        .proj-tech { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .proj-tech span { font-size: 9px; padding: 2px 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; color: rgba(255,255,255,0.55); }
        .proj-link { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; padding: 5px 12px; border: 1px solid #00e1ff; color: #00e1ff; border-radius: 3px; text-decoration: none; font-family: 'Orbitron', monospace; letter-spacing: 1px; }

        /* ── Contact ────────────────────────── */
        .contact { margin-bottom: 40px; }
        .contact-desc { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 16px; line-height: 1.6; }
        .contact-links { display: flex; flex-direction: column; gap: 8px; }
        .contact-link {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.08); border-radius: 4px;
            background: rgba(255,255,255,0.025);
            text-decoration: none; color: rgba(255,255,255,0.8);
            font-size: 12px; transition: border-color 0.2s, color 0.2s;
        }
        .contact-link:hover { border-color: rgba(0,225,255,0.35); color: #00e1ff; }
        .contact-link i { font-size: 18px; width: 20px; text-align: center; }
        .contact-link b { font-weight: 600; }
        .contact-link small { margin-left: auto; font-size: 10px; opacity: 0.55; }

        /* ── Footer ────────────────────────── */
        .footer { text-align: center; font-size: 10px; color: rgba(255,255,255,0.55); padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

<body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <canvas id="renderCanvas" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <!-- SEO : h1 sémantique pour crawlers -->
    <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap">samsoucoupe — Développeur Backend Full-Stack</h1>

    <div id="sections-root" class="page"></div>

    <footer class="footer">
        <span>© 2026 samsoucoupe</span>
        <span class="footer-sep">•</span>
        <span>Babylon.js · 3D Portfolio</span>
    </footer>

    <!-- Fallback SEO : contenu statique si JS désactivé -->
    <noscript>
        <div style="max-width:600px;margin:0 auto;padding:24px 16px;color:#e8f0ff;background:#03060e;font-family:system-ui,sans-serif">
            <h2 style="font-size:1.5em;margin-bottom:8px">samsoucoupe</h2>
            <p style="color:#9fb0d0;margin-bottom:16px">Développeur Backend Full-Stack. Python, Java, TypeScript, Data Science, Game Dev.</p>
            <h3 style="font-size:1.1em;color:#00e1ff;margin:24px 0 8px">Projets</h3>
            <p style="color:#9fb0d0"><a href="https://samsoucoupe.github.io/Candy-Crush-bis/" style="color:#00e1ff">Candy Crush UE Game</a> · <a href="https://samsoucoupe.github.io/Velocity-Olympiad/" style="color:#00e1ff">Velocity Olympiad</a> · <a href="https://samsoucoupe.github.io/GOW2025/" style="color:#00e1ff">Dreamland</a></p>
            <h3 style="font-size:1.1em;color:#00e1ff;margin:24px 0 8px">Contact</h3>
            <p style="color:#9fb0d0"><a href="https://github.com/samsoucoupe" style="color:#00e1ff">GitHub</a> · <a href="https://buymeacoffee.com/samsoucoupe" style="color:#00e1ff">Buy Me a Coffee</a> · <a href="https://ko-fi.com/samsoucoupe" style="color:#00e1ff">Ko-fi</a></p>
            <p style="margin-top:16px"><a href="index.html" style="color:#00e1ff">← Version 3D interactive</a></p>
        </div>
    </noscript>

    <script type="module" src="/src/starfield-background.ts"></script>
    <script type="module" src="/src/portfolio-data.ts"></script>
    <script type="module">
        import { PORTFOLIO } from '/src/portfolio-data';
        var P = PORTFOLIO || {};
        var STATUS = P.statusLabels || { 'terminée': 'TERMINÉE', 'actif': 'ACTIF', 'archivé': 'ARCHIVÉ', 'en cours': 'EN COURS' };

        function esc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        var root = document.getElementById('sections-root');

        // ── Hero + Stats ───────────────────
        var id = P.identity || {};
        var ab = P.about || {};

        var statsHtml = '';
        if (ab.stats && ab.stats.length) {
            statsHtml = '<div class="stats">';
            ab.stats.forEach(function(s) {
                statsHtml += '<div class="stat"><div class="stat-n">' + esc(s.number) + '</div><div class="stat-l">' + esc(s.label) + '</div></div>';
            });
            statsHtml += '</div>';
        }

        root.innerHTML +=
            '<div class="hero">' +
                '<img class="hero-avatar" src="' + esc(id.avatar || 'assets/pdpSamsoucoupe.gif') + '" alt="' + esc(id.name) + '" loading="lazy">' +
                '<div class="hero-name">' + esc(id.name) + '</div>' +
                (id.role ? '<div class="hero-role">' + esc(id.role) + '</div>' : '') +
                (id.tagline ? '<div class="hero-tagline">' + esc(id.tagline) + '</div>' : '') +
                statsHtml +
            '</div>';

        // ── About ───────────────────────────
        if (ab.paragraphs && ab.paragraphs.length) {
            root.innerHTML += '<div class="about"><div class="sec-title">À propos</div>';
            ab.paragraphs.forEach(function(p) {
                root.innerHTML += '<p class="about-text">' + esc(p) + '</p>';
            });
            root.innerHTML += '</div>';
        }

        // ── Skills ──────────────────────────
        var sk = P.skills || {};
        if (sk.categories && sk.categories.length) {
            root.innerHTML += '<div class="skills"><div class="sec-title">Compétences</div>';
            sk.categories.forEach(function(cat) {
                var tags = cat.tags.map(function(t) { return '<span>' + esc(t.label) + '</span>'; }).join('');
                root.innerHTML += '<div class="skill-cat">' +
                    '<div class="skill-cat-name"><i class="' + esc(cat.icon) + '"></i> ' + esc(cat.name) + '</div>' +
                    '<div class="skill-tags">' + tags + '</div>' +
                '</div>';
            });
            root.innerHTML += '</div>';
        }

        // ── Projects ────────────────────────
        var pr = P.projects || {};
        if (pr.items && pr.items.length) {
            root.innerHTML += '<div class="projects"><div class="sec-title">Projets</div>';
            pr.items.forEach(function(p) {
                var img = '';
                if (p.media && p.media.length) {
                    var m = p.media[0];
                    if (m.type === 'img') img = '<img class="proj-img" src="' + esc(m.src) + '" alt="' + esc(m.alt || '') + '" loading="lazy">';
                }
                var tech = (p.tech || []).map(function(t) { return '<span>' + esc(t) + '</span>'; }).join('');
                var link = p.link ? '<a class="proj-link" href="' + esc(p.link) + '" target="_blank"><i class="fas fa-rocket"></i> Lancer</a>' : '';
                var st = p.status || 'terminée';
                var sl = STATUS[st] || st.toUpperCase();
                root.innerHTML += '<div class="proj-card">' +
                    '<div class="proj-top"><span class="proj-title">' + esc(p.title) + '</span><span class="proj-status ' + esc(st) + '">' + esc(sl) + '</span></div>' +
                    img +
                    '<p class="proj-desc">' + esc(p.description) + '</p>' +
                    '<div class="proj-tech">' + tech + '</div>' +
                    link +
                '</div>';
            });
            root.innerHTML += '</div>';
        }

        // ── Contact ──────────────────────────
        var ct = P.contact || {};
        if (ct.title || ct.description || id.discord || id.github || id.bmc || id.kofi) {
            root.innerHTML += '<div class="contact"><div class="sec-title">Contact</div>';
            if (ct.description) root.innerHTML += '<p class="contact-desc">' + esc(ct.description) + '</p>';
            root.innerHTML += '<div class="contact-links">';
            if (id.discord) root.innerHTML += '<a class="contact-link" href="' + esc(id.discord) + '" target="_blank"><i class="fab fa-discord"></i><b>Discord</b><small>#samsoucoupe</small></a>';
            if (id.github)  root.innerHTML += '<a class="contact-link" href="' + esc(id.github) + '" target="_blank"><i class="fab fa-github"></i><b>GitHub</b><small>/samsoucoupe</small></a>';
            if (id.bmc)     root.innerHTML += '<a class="contact-link" href="' + esc(id.bmc) + '" target="_blank"><i class="fas fa-coffee"></i><b>Buy Me a Coffee</b><small>soutien</small></a>';
            if (id.kofi)    root.innerHTML += '<a class="contact-link" href="' + esc(id.kofi) + '" target="_blank"><i class="fas fa-heart"></i><b>Ko-fi</b><small>soutien</small></a>';
            root.innerHTML += '</div></div>';
        }
    </script>
</body>
</html>
